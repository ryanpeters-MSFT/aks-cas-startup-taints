apiVersion: v1
kind: ServiceAccount
metadata:
  name: startup-taint-remover
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: startup-taint-remover
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "patch", "update"]
- apiGroups: ["admissionregistration.k8s.io"]
  resources: ["validatingwebhookconfigurations"]
  verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: startup-taint-remover
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: startup-taint-remover
subjects:
- kind: ServiceAccount
  name: startup-taint-remover
  namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: startup-taint-remover
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: startup-taint-remover
  template:
    metadata:
      labels:
        app: startup-taint-remover
    spec:
      serviceAccountName: startup-taint-remover
      nodeSelector:
        kubernetes.azure.com/agentpool: userpool
      tolerations:
      - key: "startup-taint.cluster-autoscaler.kubernetes.io/testpodschedule"
        operator: "Equal"
        value: "unavailable"
        effect: "NoSchedule"
      containers:
      - name: remover
        image: bitnami/kubectl:latest
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        command: ["/bin/sh", "-c"]
        args:
        - |
          kubectl get validatingwebhookconfiguration aks-node-validating-webhook -o yaml \
          | sed -e 's/\(objectSelector: \){}/\1{"matchLabels": {"disable":"true"}}/g' \
          | kubectl apply -f -
          sleep 5
          kubectl taint nodes "$NODE_NAME" startup-taint.cluster-autoscaler.kubernetes.io/testpodschedule:NoSchedule- || true
          echo "Removed taint from node: $NODE_NAME"
          sleep infinity
